          Spara ändringar

      <!-- Preview -->

        <img id="hero-preview-image" class="hero-preview-image" src="" alt="Hero preview">

        <p id="hero-preview-subtitle" class="hero-preview-subtitle"></p>
      </div>

      <!-- Form -->
      <div class="settings-card">
        <h2 class="settings-title">Redigera hero</h2>

        <div class="form-group">
          <label class="form-label">Titel</label>
          <input type="text" id="hero-title" class="form-input" placeholder="NorthWind Scatters">
        </div>

        <div class="form-group">
          <label class="form-label">Undertext</label>
          <textarea id="hero-subtitle" class="form-textarea" placeholder="Norsk Skogskatt uppfödning med kärlek och omsorg i Sverige."></textarea>
        </div>

          <label class="form-label">Bild</label>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="image-upload.js"></script>
  <script src="admin.js"></script>
  <script>
    // Load hero settings
    window.loadHero = async function() {
      try {
        const { data: settings, error } = await supabaseClient
          .from('settings')
          .select('*')
          .in('key', ['hero_title', 'hero_subtitle', 'hero_image_url']);
        
        if (error) throw error;
        
        const settingsObj = {};
        (settings || []).forEach(s => {
          settingsObj[s.key] = s.value;
        });
        
        // Set form values
        document.getElementById('hero-title').value = settingsObj.hero_title || 'NorthWind Scatters';
        document.getElementById('hero-subtitle').value = settingsObj.hero_subtitle || '';
        
        // Set preview
        document.getElementById('hero-preview-title').textContent = settingsObj.hero_title || 'NorthWind Scatters';
        document.getElementById('hero-preview-subtitle').textContent = settingsObj.hero_subtitle || '';
        
        // Set image
        const imageUrl = settingsObj.hero_image_url || 'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=1920&q=80';
        document.getElementById('hero-preview-image').src = imageUrl;
        
        // Initialize image uploader
        if (window.createImageUploader) {
          createImageUploader('hero-image-uploader', 'hero_image_url', imageUrl);
        }
        
        // Live preview
        document.getElementById('hero-title').addEventListener('input', (e) => {
          document.getElementById('hero-preview-title').textContent = e.target.value;
        });
        
        document.getElementById('hero-subtitle').addEventListener('input', (e) => {
          document.getElementById('hero-preview-subtitle').textContent = e.target.value;
        });
        
      } catch (error) {
        console.error('Error loading hero settings:', error);
      }
    };
    
    // Save hero settings
    window.saveHero = async function() {
      try {
        const title = document.getElementById('hero-title').value;
        const subtitle = document.getElementById('hero-subtitle').value;
        const imageUrl = window.getImageValue ? window.getImageValue('hero-image-uploader') : '';
        
        // Save title
        await supabaseClient
          .from('settings')
          .upsert({ key: 'hero_title', value: title }, { onConflict: 'key' });
        
        // Save subtitle
        await supabaseClient
          .from('settings')
          .upsert({ key: 'hero_subtitle', value: subtitle }, { onConflict: 'key' });
        
        // Save image URL
        if (imageUrl) {
          await supabaseClient
            .from('settings')
            .upsert({ key: 'hero_image_url', value: imageUrl }, { onConflict: 'key' });
        }
        
        alert('Hero sparad!');
        
      } catch (error) {
        console.error('Error saving hero:', error);
        alert('Kunde inte spara: ' + error.message);
      }
    };
    
    // Initialize
    loadHero();
    
    // Mobile menu toggle
    document.getElementById('mobile-menu-toggle').onclick = () => {
      document.querySelector('.admin-layout').classList.toggle('sidebar-open');
    };
  </script>
