<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galleri | Admin - NorthWind Scatters</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .admin-layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
      background: var(--color-neutral-light);
    }
    
    @media (max-width: 768px) {
      .admin-layout {
        grid-template-columns: 1fr;
      }
    }
    
    .admin-sidebar {
      background: var(--color-primary);
      color: white;
      padding: var(--space-6);
    }
    
    .admin-brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-8);
    }
    
    .admin-brand-icon {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    
    .admin-brand-text {
      font-family: var(--font-heading);
      font-size: var(--text-lg);
    }
    
    .admin-nav {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    
    .admin-nav-item {
      margin-bottom: var(--space-2);
    }
    
    .admin-nav-link {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      color: rgba(255,255,255,0.8);
      transition: all 0.2s ease;
      font-size: var(--text-sm);
      text-decoration: none;
    }
    
    .admin-nav-link:hover,
    .admin-nav-link.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    
    .admin-content {
      padding: var(--space-8);
    }
    
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-6);
      flex-wrap: wrap;
      gap: var(--space-3);
    }
    
    .admin-title {
      font-family: var(--font-heading);
      font-size: var(--text-3xl);
    }
    
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: var(--space-6);
    }
    
    .gallery-card {
      background: white;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    
    .gallery-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    
    .gallery-caption {
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin: 0;
    }
    
    .gallery-actions {
      padding: var(--space-3) var(--space-4);
      display: flex;
      gap: var(--space-2);
      border-top: 1px solid rgba(0,0,0,0.05);
    }
  </style>
</head>
<body data-page="gallery">
  
  <div class="admin-layout">
    
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <div class="admin-brand-icon">N</div>
        <span class="admin-brand-text">NorthWind</span>
      </div>
      
      <nav>
        <ul class="admin-nav">
          <li class="admin-nav-item">
            <a href="admin-dashboard.html" class="admin-nav-link">📊 Dashboard</a>
          </li>
          <li class="admin-nav-item">
            <a href="admin-kittens.html" class="admin-nav-link">🐱 Kattungar</a>
          </li>
          <li class="admin-nav-item">
            <a href="admin-cats.html" class="admin-nav-link">🐾 Mina katter</a>
          </li>
          <li class="admin-nav-item">
            <a href="admin-news.html" class="admin-nav-link">📰 Nyheter</a>
          </li>
          <li class="admin-nav-item">
            <a href="admin-gallery.html" class="admin-nav-link active">🖼️ Galleri</a>
          </li>
          <li class="admin-nav-item">
            <a href="admin-about.html" class="admin-nav-link">ℹ️ Om Oss</a>
          </li>
          <li class="admin-nav-item">
            <a href="admin-settings.html" class="admin-nav-link">⚙️ Inställningar</a>
          </li>
          <li class="admin-nav-item" style="margin-top: var(--space-8);">
            <a href="index.html" class="admin-nav-link">🌐 Visa sida</a>
          </li>
          <li class="admin-nav-item">
            <a href="admin-login.html" class="admin-nav-link">🚪 Logga ut</a>
          </li>
        </ul>
      </nav>
    </aside>
    
    <!-- Content -->
    <main class="admin-content">
      
      <div class="admin-header">
        <h1 class="admin-title">Galleri</h1>
        <button class="btn btn-primary" onclick="window.Admin?.openGalleryModal()">
          + Lägg till bild
        </button>
      </div>
      
      <!-- Gallery Grid -->
      <div id="gallery-grid" class="gallery-grid">
        <div class="text-center" style="grid-column: 1 / -1; padding: var(--space-12);">
          <p style="color: var(--color-text-muted);">Laddar galleri...</p>
        </div>
      </div>
      
    </main>
    
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="image-upload.js"></script>
  <script src="admin.js"></script>
  <script>
    // Gallery-specific functions
    async function loadGallery() {
      try {
        const container = document.getElementById('gallery-grid');
        
        const { data: images, error } = await supabaseClient
          .from('gallery')
          .select('*')
          .order('created_at', { ascending: false });
        
        if (error) throw error;
        
        if (!images || images.length === 0) {
          container.innerHTML = `
            <div class="text-center" style="grid-column: 1 / -1; padding: var(--space-12);">
              <p style="color: var(--color-text-muted);">Inga bilder i galleriet</p>
            </div>
          `;
          return;
        }
        
        const cards = images.map(img => `
          <div class="gallery-card">
            <img src="${img.image_url}" alt="${img.caption || 'Galleribild'}" class="gallery-image">
            ${img.caption ? `<p class="gallery-caption">${img.caption}</p>` : ''}
            <div class="gallery-actions">
              <button class="btn btn-outline btn-sm" onclick="window.Admin?.editGalleryImage('${img.id}')">Redigera</button>
              <button class="btn btn-outline btn-sm" style="color: var(--color-accent); border-color: var(--color-accent);" onclick="window.Admin?.deleteGalleryImage('${img.id}')">Ta bort</button>
            </div>
          </div>
        `).join('');
        
        container.innerHTML = cards;
        
      } catch (error) {
        console.error('Error loading gallery:', error);
      }
    }
    
    document.addEventListener('DOMContentLoaded', loadGallery);
  </script>
</body>
</html>
